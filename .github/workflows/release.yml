name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger build on tag creation e.g., v1.1.1

permissions:
  contents: write # Crucial for creating releases and uploading assets

jobs:
  # Job 1: Build macOS Bundle
  macos:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Compile and Package App
        run: |
          chmod +x build.sh
          ./build.sh
          
      - name: Zip Bundle
        run: |
          zip -r LocalIP-macOS.zip LocalIP.app
          
      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-bin
          path: LocalIP-macOS.zip

  # Job 2: Build Windows Native C# Binary
  windows:
    name: Build Windows App
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Locate and Add CSC to PATH
        run: |
          $cscPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.VisualStudio.Component.Roslyn.Compiler -find MSBuild\**\CSC.exe | Select-Object -First 1
          $cscDir = Split-Path $cscPath
          Write-Output "Found CSC in: $cscDir"
          echo "$cscDir" >> $env:GITHUB_PATH
        shell: pwsh
        
      - name: Compile Windows C# Code
        run: |
          # Use pre-installed C# compiler in Windows runner to build a clean GUI executable
          csc /target:winexe /out:LocalIP.exe windows\LocalIP.cs
          Compress-Archive -Path LocalIP.exe -DestinationPath LocalIP-Windows.zip
          
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-bin
          path: LocalIP-Windows.zip

  # Job 3: Build Linux Native Go Binary
  linux:
    name: Build Linux App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'
          
      - name: Install GTK Development Headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev
          
      - name: Compile Linux Go Code
        run: |
          cd linux
          go mod init localip
          go mod tidy
          go build -o LocalIP-linux main.go
          tar -czvf ../LocalIP-Linux.tar.gz LocalIP-linux
          
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bin
          path: LocalIP-Linux.tar.gz

  # Job 4: Gather all builds and publish to GitHub Releases
  release:
    name: Publish GitHub Release
    needs: [macos, windows, linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Download macOS Binary
        uses: actions/download-artifact@v4
        with:
          name: macos-bin
          path: .
          
      - name: Download Windows Binary
        uses: actions/download-artifact@v4
        with:
          name: windows-bin
          path: .
          
      - name: Download Linux Binary
        uses: actions/download-artifact@v4
        with:
          name: linux-bin
          path: .
          
      - name: Create Multi-Platform GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            LocalIP-macOS.zip
            LocalIP-Windows.zip
            LocalIP-Linux.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
